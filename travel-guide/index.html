<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#667eea">
  <title>瑞士法国旅行指南</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>瑞士法国之旅</h1>
      <div class="header-actions">
        <button class="btn btn-today" id="todayBtn">今天</button>
        <button class="btn btn-search" id="searchBtn" aria-label="搜索行程">搜索</button>
      </div>
    </header>

    <main class="main">
      <div class="trip-summary">
        <div class="trip-dates">2026年4月24日 - 5月5日</div>
        <div class="trip-stats">12天 | 4个国家 | 7个城市</div>
      </div>

      <div class="days-list" id="daysList">
        <!-- Day cards will be inserted here by JavaScript -->
      </div>
    </main>

    <div class="search-overlay" id="searchOverlay">
      <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索景点、住宿、交通..." aria-label="搜索框">
        <button class="btn btn-close" id="closeSearchBtn">✕</button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <script src="js/offline.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
