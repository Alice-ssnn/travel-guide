<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线模式 - 瑞士法国旅行指南</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .offline-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .offline-icon {
      font-size: 64px;
      margin-bottom: 24px;
      opacity: 0.7;
    }

    .offline-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .offline-message {
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-secondary);
      margin-bottom: 32px;
      max-width: 400px;
    }

    .offline-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-offline {
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-reload {
      background: var(--primary);
      color: white;
    }

    .btn-home {
      background: var(--background-secondary);
      color: var(--text-primary);
    }

    @media (max-width: 768px) {
      .offline-actions {
        flex-direction: column;
        width: 100%;
        max-width: 280px;
      }

      .btn-offline {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📶</div>
    <h1 class="offline-title">离线模式</h1>
    <p class="offline-message">
      当前网络连接不可用。部分功能可能受限，但您可以继续查看已缓存的行程信息。
    </p>
    <div class="offline-actions">
      <button class="btn-offline btn-reload" onclick="window.location.reload()">
        重新加载
      </button>
      <button class="btn-offline btn-home" onclick="window.location.href='/'">
        返回首页
      </button>
    </div>
  </div>

  <script>
    // Check network status
    if (navigator.onLine) {
      // If online, redirect to home page
      window.location.href = '/';
    }
  </script>
</body>
</html>
